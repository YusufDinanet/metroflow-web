<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroFlow - İstanbul Ulaşım Asistanınız</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            max-width: 480px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 3.2rem;
            margin: 0;
            letter-spacing: -2px;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 15px 0 35px 0;
        }
        
        .video-wrapper {
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: #000;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            line-height: 0;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }

        .app-store-btn {
            display: inline-block;
            transition: transform 0.3s ease;
            text-decoration: none;
        }
        .app-store-btn:hover {
            transform: scale(1.05);
        }
        .app-store-btn img {
            height: 60px;
        }
        
        .footer-nav {
            margin-top: 45px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .privacy-link {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .privacy-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>MetroFlow</h1>
        <p class="subtitle">İstanbul metrosunu cebinizden yönetin. Anlık sefer verileri ve kusursuz rota deneyimi.</p>

        <div class="video-wrapper">
            <video autoplay loop muted playsinline webkit-playsinline preload="auto">
                <source src="promo.mp4" type="video/mp4">
            </video>
        </div>

        <a href="https://apps.apple.com/us/app/metroflow/id6760014955" class="app-store-btn" target="_blank">
            <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/tr-tr?size=250x83" alt="App Store'dan İndirin">
        </a>

        <div class="footer-nav">
            <a href="mailto:destek@metroflow.ist" style="color:var(--primary-color); text-decoration:none; font-weight:500;">destek@metroflow.ist</a>
            <a href="privacy.html" class="privacy-link">Gizlilik Politikası (Privacy Policy)</a>
        </div>
    </div>

</body>
</html>
