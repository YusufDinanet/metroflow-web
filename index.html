<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroFlow - İstanbul Ulaşım Asistanınız</title>
    <style>
        :root {
            --primary-color: #007AFF; /* Apple Mavi */
            --bg-color: #F5F5F7;
            --text-color: #1D1D1F;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 1.1rem;
            color: #86868B;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .download-btn {
            display: inline-block;
            background-color: var(--text-color);
            color: white;
            padding: 14px 32px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            transform: scale(1.05);
            background-color: #000;
        }
        .footer-links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 0.9rem;
        }
        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MetroFlow</h1>
        <p>İstanbul'un ritmini yakalayın. Marmaray ve M4 metro hatları için anlık sefer bilgileri, gecikmeler ve akıllı rota asistanı çok yakında App Store'da.</p>
        
        <a href="#" class="download-btn">App Store'da Çok Yakında</a>

        <div class="footer-links">
            <a href="mailto:destek@metroflow.ist">Destek (Support)</a>
            <a href="privacy.html">Gizlilik Politikası (Privacy Policy)</a>
        </div>
    </div>

</body>
</html>
