<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroFlow - İstanbul Ulaşım Asistanınız</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            max-width: 480px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .badge-live {
            display: inline-flex;
            align-items: center;
            background: rgba(52, 199, 89, 0.15);
            color: #34C759;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 25px;
            border: 1px solid rgba(52, 199, 89, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .badge-dot {
            height: 8px;
            width: 8px;
            background-color: #34C759;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #34C759;
        }
        h1 {
            font-size: 3.2rem;
            margin: 0;
            letter-spacing: -2px;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 15px 0 35px 0;
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 32px;
            padding: 6px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .video-container {
            border-radius: 26px;
            overflow: hidden;
            background: #000;
            line-height: 0;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }

        .app-store-btn {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }
        .app-store-btn:hover {
            transform: scale(1.06);
        }
        .app-store-btn img {
            height: 62px;
        }
        
        .footer-nav {
            margin-top: 45px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .privacy-link {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            display: inline-block;
            align-self: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .privacy-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: rgba(255,255,255,0.1);
        }
        .email-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            opacity: 0.9;
        }
        .email-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge-live">
            <span class="badge-dot"></span> App Store'da Yayında
        </div>
        
        <h1>MetroFlow</h1>
        <p class="subtitle">İstanbul metrosunu cebinizden yönetin. Anlık sefer verileri ve kusursuz rota deneyimi şimdi cebinizde.</p>

        <div class="video-wrapper">
            <div class="video-container">
                <video autoplay loop muted playsinline webkit-playsinline preload="auto">
                    <source src="promo.mp4" type="video/mp4">
                    Tarayıcınız video oynatmayı desteklemiyor.
                </video>
            </div>
        </div>

        <a href="https://apps.apple.com/us/app/metroflow/id6760014955" class="app-store-btn" target="_blank">
            <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/tr-tr?size=250x83" alt="App Store'dan İndirin">
        </a>

        <div class="footer-nav">
            <a href="mailto:destek@metroflow.ist" class="email-link">destek@metroflow.ist</a>
            <a href="privacy.html" class="privacy-link">Gizlilik Politikası (Privacy Policy)</a>
        </div>
    </div>

</body>
</html>
