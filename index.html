<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroFlow - İstanbul Ulaşım Asistanınız</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.8);
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Tam ekran video için */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            background-color: #000; /* Video yüklenene kadar siyah ekran */
        }

        /* Video Arka Plan Konfigürasyonu */
        .video-background {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100; /* En arkaya at */
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover; /* Videoyu boşluk bırakmadan sığdır */
            opacity: 0.7; /* Videoyu biraz karart ki metinler okunsun */
        }

        /* İçerik Kartı */
        .hero-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%); /* Hafif gölgeleme */
            padding: 0 20px;
        }

        .logo-placeholder {
            width: 120px;
            height: 120px;
            background: var(--primary-color);
            border-radius: 28px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3.5rem;
            font-weight: bold;
            box-shadow: 0 20px 40px rgba(0, 122, 255, 0.4);
        }

        h1 {
            font-size: 3.8rem;
            margin: 0 0 15px 0;
            letter-spacing: -2px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        p.subtitle {
            font-size: 1.4rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.5;
            max-width: 600px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        .app-store-btn {
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .app-store-btn:hover {
            transform: scale(1.08);
        }
        .app-store-btn img {
            height: 65px;
        }

        .contact-link {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .contact-link:hover {
            color: var(--text-main);
        }

    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-background">
        <source src="metroflow_promo.mp4" type="video/mp4">
        Tarayıcınız video etiketini desteklemiyor.
    </video>

    <div class="hero-container">
        <div class="logo-placeholder">M</div>
        
        <h1>MetroFlow Yayında!</h1>
        <p class="subtitle">İstanbul'un en hızlı, en akıllı metro asistanını hemen deneyimleyin. Canlı takip ve rota planlama şimdi App Store'da.</p>

        <a href="BURAYA_APP_STORE_LINKINI_YAPISTIR" class="app-store-btn">
            <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/tr-tr?size=250x83" alt="App Store'dan İndirin">
        </a>

        <a href="mailto:destek@metroflow.ist" class="contact-link">Destek & Geri Bildirim</a>
    </div>

</body>
</html>
